<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0a0a0c" />
    <meta
      name="description"
      content="DevDash — a modern developer dashboard to organize projects, notes, tasks, snippets, commands and links in one place."
    />
    <title>DevDash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var raw = localStorage.getItem('devdash:store')
          var theme = raw ? JSON.parse(raw)?.state?.settings?.theme : 'dark'
          var dark =
            theme === 'light'
              ? false
              : theme === 'system'
                ? window.matchMedia('(prefers-color-scheme: dark)').matches
                : true
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
